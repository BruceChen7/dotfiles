onboarding = false

[theme]
name = "gruvbox"

auto_switch = false
[keys]
prefix = "`"
settings = "prefix+,"
split_horizontal = "prefix+s"

# === Workspace management ===
new_workspace = "prefix+o"         # o = open workspace
new_worktree = "prefix+t"          # t = tree
rename_workspace = "prefix+r"      # r = rename
close_workspace = "prefix+d"       # d = delete

# === Tab management ===
rename_tab = "prefix+."            # . = period (free)
close_tab = "prefix+/"             # / = slash (free)
switch_tab = "alt+1..9"          # alt+1..9 switch tab (direct, no prefix)

# === Pane management ===
rename_pane = "prefix+alt+p"       # alt+p

# === Pane swapping (alt instead of shift) ===
swap_pane_left = "prefix+alt+h"
swap_pane_down = "prefix+alt+j"
swap_pane_up = "prefix+alt+k"
swap_pane_right = "prefix+alt+l"

# === Other ===
cycle_pane_previous = "prefix+alt+tab"
reload_config = "prefix+i"         # i = initialize

# === Displaced defaults ===
open_notification_target = ""      # prefix+o → new_workspace
resize_mode = "prefix+alt+r"       # prefix+r → rename_workspace

[ui]
agent_panel_sort = "priority"

show_agent_labels_on_pane_borders = false
[ui.toast]
delivery = "system"

# =============================================================================
# herdr-nav-plugin — Ctrl+h/j/k/l pane & Vim split navigation
# =============================================================================
# Each binding references a plugin action from the herdr-nav-plugin
# (~/work/dotfiles/herdr/herdr-nav-plugin/). The navigate.sh script
# detects whether the focused pane is running Neovim and either forwards
# the Ctrl chord into Vim or moves herdr's focus directly.
#
# Neovim side: ~/.config/nvim/after/plugin/herdr-nav.lua
#
# Disable this block to revert to default Ctrl+h/j/k/l readline behavior.
# =============================================================================

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "herdr-nav.left"
description = "navigate left (herdr/nvim)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "herdr-nav.down"
description = "navigate down (herdr/nvim)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "herdr-nav.up"
description = "navigate up (herdr/nvim)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "herdr-nav.right"
description = "navigate right (herdr/nvim)"

# =============================================================================
# Clear screen — replaces Ctrl+l (captured by navigation above)
# =============================================================================
# Sends Ctrl+l to the current pane via the herdr-nav-plugin.clear-screen action.
# Mirrors tmux's prefix+k approach (bind k send-keys -R \; send-keys C-l \; clear-history).

[[keys.command]]
key = "prefix+k"
type = "plugin_action"
command = "herdr-nav.clear-screen"
description = "clear screen (herdr)"

[experimental]
pane_history = false
