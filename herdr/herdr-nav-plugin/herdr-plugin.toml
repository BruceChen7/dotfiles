# herdr-nav-plugin — herdr plugin definition
# ==========================================
# Provides 4 navigation actions (left/down/up/right) for seamless navigation
# between herdr panes and Neovim splits using Ctrl+h/j/k/l, plus a
# clear-screen action (prefix+k) as a replacement for Ctrl+l.
#
# These actions are referenced from config.toml via `[[keys.command]]`:
#   command = "herdr-nav.left"  → this plugin's "left" action
#
# Install: herdr plugin link ~/work/dotfiles/herdr/herdr-nav-plugin

id = "herdr-nav"
name = "Herdr Navigation"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Seamless Ctrl+h/j/k/l navigation across herdr panes and Neovim splits"
platforms = ["linux", "macos"]

# One action per direction. Each forwards the Ctrl chord into Vim (when running
# in the focused pane) or moves herdr's pane focus directly.
[[actions]]
id = "left"
title = "Navigate left (herdr/Neovim)"
contexts = ["global"]
command = ["bash", "navigate.sh", "left"]

[[actions]]
id = "down"
title = "Navigate down (herdr/Neovim)"
contexts = ["global"]
command = ["bash", "navigate.sh", "down"]

[[actions]]
id = "up"
title = "Navigate up (herdr/Neovim)"
contexts = ["global"]
command = ["bash", "navigate.sh", "up"]

[[actions]]
id = "right"
title = "Navigate right (herdr/Neovim)"
contexts = ["global"]
command = ["bash", "navigate.sh", "right"]

# Clear screen — replaces Ctrl+l (captured by navigation above).
# Bind to prefix+k in config.toml for tmux-consistent behavior.
[[actions]]
id = "clear-screen"
title = "Clear screen"
contexts = ["global"]
command = ["bash", "navigate.sh", "clear-screen"]
